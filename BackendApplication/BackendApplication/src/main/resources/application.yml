## ──────────────────────────────────────────────
## SECTION 1: Server config
## This tells Spring Boot which port to run on.
## Your backend API will be at http://localhost:8080
## ──────────────────────────────────────────────
server:
  port: 8081

spring:
  application:
    name: BackendApplication

  ## ──────────────────────────────────────────────
  ## SECTION 2: Database connection (PostgreSQL)
  ## These values MUST match your docker-compose.yml!
  ##   POSTGRES_DB: codereview     → /codereview in the url
  ##   POSTGRES_USER: reviewer     → username
  ##   POSTGRES_PASSWORD: reviewpass → password
  ## ──────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/codereview
    username: reviewer
    password: reviewpass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10

  ## ──────────────────────────────────────────────
  ## SECTION 3: JPA / Hibernate settings
  ## - ddl-auto: validate → Hibernate checks your Entity classes
  ##   match the DB tables, but does NOT create/modify tables
  ##   (Flyway handles that instead — you'll add it next)
  ## - show-sql: false → set to true when debugging queries
  ## ──────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  ## ──────────────────────────────────────────────
  ## SECTION 4: Redis connection
  ## Redis is your cache/queue — matches docker-compose port 6379
  ## ──────────────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  ## ──────────────────────────────────────────────
  ## SECTION 5: Flyway (database migrations)
  ## Flyway runs SQL scripts to create your tables automatically.
  ## It looks for files in src/main/resources/db/migration/
  ## ──────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  ## ──────────────────────────────────────────────
  ## SECTION 6: GitHub OAuth2 login
  ## ${GITHUB_CLIENT_ID} means "read from environment variable"
  ## These get loaded from the .env file you'll create next
  ## scope: what permissions your app requests from GitHub
  ##   - read:user  → read their profile
  ##   - repo       → access their repositories
  ##   - admin:repo_hook → manage webhooks on repos
  ## ──────────────────────────────────────────────
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope: read:user,repo,admin:repo_hook

## ──────────────────────────────────────────────
## SECTION 7: Custom app properties
## These are YOUR own config keys (not Spring's).
## You'll create an AppProperties.java class to read these.
## ──────────────────────────────────────────────
app:
  base-url: ${APP_BASE_URL:http://localhost:8081}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET}
    expiry-hours: 24
  webhook:
    secret: ${WEBHOOK_SECRET}
  ai:
    anthropic-api-key: ${ANTHROPIC_API_KEY}
    model: claude-sonnet-4-20250514
    max-tokens: 4096
    max-diff-chars: 50000
