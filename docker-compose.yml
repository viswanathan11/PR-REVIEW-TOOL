services:
  postgres:
    image: postgres:15-alpine
    container_name: reviewer_postgres
    environment:
      POSTGRES_DB: codereview
      POSTGRES_USER: reviewer
      POSTGRES_PASSWORD: reviewpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reviewer -d codereview"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: reviewer_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data

  nginx:
    image: nginx:alpine
    container_name: reviewer_nginx
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
  redisdata:
